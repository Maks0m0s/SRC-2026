<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Important Days</title>

<style>
body {
    margin: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0b1320;
    color: #eaeaf0;
    padding: 30px 16px 140px;
    text-align: center;
}

h1 {
    font-size: 2.8em;
    margin-bottom: 30px;
}

/* Animations */
@keyframes vibrate {
  0% { transform: translate(0); }
  25% { transform: translate(-1px, 1px); }
  50% { transform: translate(1px, -1px); }
  75% { transform: translate(-1px, -1px); }
  100% { transform: translate(0); }
}

@keyframes pulse-soft {
  0% { transform: scale(1); }
  50% { transform: scale(1.04); }
  100% { transform: scale(1); }
}

@keyframes today-glow {
  0% { transform: scale(1); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}

a.vibrate { animation: vibrate 1s infinite; }
a.pulse { animation: pulse-soft 1.3s infinite; }
a.today { animation: today-glow 1s infinite; }

/* Day button */
a.button {
    display: block;
    max-width: 420px;
    margin: 14px auto;
    padding: 18px 0;
    border-radius: 18px;
    font-size: 1.6em;
    text-decoration: none;
    color: white;
    box-shadow: 0 10px 26px rgba(0,0,0,0.45);
    transition: transform 0.25s ease;
}
a.button:hover {
    transform: scale(1.05);
}

/* Add / Back */
a.button-add {
    background: #1e2a44;
    color: white;
}

a.back {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 80%;
    max-width: 420px;
    background: #ffeb3b;
    color: #000;
    font-size: 1.6em;
    padding: 16px 0;
    border-radius: 18px;
    text-decoration: none;
    font-weight: 600;
}
</style>
</head>

<body>

<h1>📅 Important Days</h1>

{days}

<a href="/add-day" class="button button-add">➕ Add Day</a>
<a href="/" class="back">⬅ Back</a>

</body>
</html>
