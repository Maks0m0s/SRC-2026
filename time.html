<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{country_city}</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #0f2027, #203a43);
    color: white;
    padding-top: 30px;
    padding-bottom: 120px;
    margin: 0;
}

.page {
    padding: 10px;
}

h1 {
    font-size: 2em;
    margin-bottom: 15px;
}

/* Glass card */
.card {
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(12px);
    border-radius: 22px;
    padding: 30px 20px 35px;
    box-shadow: 0 10px 35px rgba(0,0,0,0.45);
    max-width: 420px;
    margin: auto;
}

/* Time */
.time {
    font-size: 4em;
    font-weight: bold;
    letter-spacing: 4px;
    margin: 20px 0 10px;
    animation: pulse 1.2s infinite;
}

@keyframes pulse {
    0% { opacity: 1; }
    50% { opacity: 0.65; }
    100% { opacity: 1; }
}

/* Date */
.date {
    font-size: 1.2em;
    opacity: 0.85;
    margin-bottom: 25px;
}

/* Buttons */
a.button {
    display: block;
    width: 100%;
    font-size: 1.4em;
    padding: 14px 0;
    border-radius: 16px;
    text-decoration: none;
    margin-top: 15px;
    color: white;
    background-color: #003366;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

a.button:active {
    opacity: 0.9;
}

/* Refresh */
a.delete {
    background-color: #c62828;
}

/* Back button */
a.back {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 80%;
    max-width: 400px;
    font-size: 1.4em;
    background-color: #ffeb3b;
    color: #000;
    border-radius: 16px;
    padding: 14px 0;
    text-decoration: none;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}
</style>
</head>

<body>
<div class="page">
    <div class="card">
        <h1>⏰ Current Time</h1>
        <div class="time">{time}</div>
        <div class="date">{date}</div>

        <a href="/refresh-time" class="button delete">🔄 Refresh Time</a>
    </div>
</div>

<a href="/" class="back">⬅ Back</a>
</body>
</html>
