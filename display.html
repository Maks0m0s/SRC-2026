<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Display</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: linear-gradient(135deg,#0f2027,#203a43);
    color: white;
    margin: 0;
    padding: 10px;
}

h1 {
    margin: 15px 0;
}

.card {
    background: #001f4d;
    margin: 10px auto;
    padding: 15px;
    border-radius: 12px;
    max-width: 280px;
}

.big {
    font-size: 28px;
    font-weight: bold;
}

.button {
    display: block;
    margin: 8px auto;
    padding: 12px;
    max-width: 260px;
    border-radius: 10px;
    text-decoration: none;
    color: white;
    background: #003366;
}

.on { background: #2e7d32; }
.off { background: #b71c1c; }

input {
    width: 80px;
    padding: 6px;
    margin: 5px;
    border-radius: 6px;
    border: none;
    text-align: center;
}

.save {
    background: #ff9800;
}

.back {
    background: #ffeb3b;
    color: black;
}
</style>
</head>

<body>

<h1>🖥 Display</h1>

<div class="card">
    <div class="big">{brightness}</div>
</div>

<a href="/display/on" class="button on">ON</a>
<a href="/display/off" class="button off">OFF</a>
<a href="/display/plus" class="button">Brightness +</a>
<a href="/display/minus" class="button">Brightness -</a>

<div class="card">
    <h3>⏱ Routine</h3>

    <form action="/set-routine" method="POST">
        <div>
            ON:
            <input name="on_h" type="number" min="0" max="23" value="{on_h}">
            :
            <input name="on_m" type="number" min="0" max="59" value="{on_m}">
        </div>

        <div>
            OFF:
            <input name="off_h" type="number" min="0" max="23" value="{off_h}">
            :
            <input name="off_m" type="number" min="0" max="59" value="{off_m}">
        </div>

        <button class="button save" type="submit">Save Routine</button>
    </form>

</div>

<div>{message}</div>

<a href="/" class="button back">Back</a>

</body>
</html>
