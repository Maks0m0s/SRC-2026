<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Display</title>
<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #0f2027, #203a43);
    color: white;
    padding-top: 15px;
    padding-bottom: 100px;
}
h1 {
    font-size: 2.5em;
    margin-bottom: 25px;
}
.panel {
    background-color: #001f4d;
    margin: 20px auto;
    width: 70%;
    max-width: 300px;
    padding: 20px;
    border-radius: 18px;
    font-size: 1.8em;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}
.state {
    font-size: 2em;
}
a.button {
    display: block;
    width: 70%;
    max-width: 300px;
    margin: 12px auto;
    background-color: #003366;
    color: #ffffff;
    font-size: 1.8em;
    padding: 14px 0;
    border-radius: 18px;
    text-decoration: none;
}
a.power-on {
    background-color: #2e7d32;
}
a.power-off {
    background-color: #b71c1c;
}
.message {
    margin-top: 15px;
    font-size: 1.3em;
    color: #ffeb3b;
    min-height: 1.4em;
}
a.back {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 80%;
    max-width: 350px;
    font-size: 1.8em;
    background-color: #ffeb3b;
    color: black;
    border-radius: 20px;
    padding: 16px 0;
    text-decoration: none;
}
</style>
</head>
<body>
<h1>🖥 Display</h1>
<div class="panel">
    <div class="state">
        <b>{brightness}</b>
    </div>
</div>
<a href="/display/on" class="button power-on">🔆 ON</a>
<a href="/display/off" class="button power-off">🌑 OFF</a>
<a href="/display/plus" class="button">➕</a>
<a href="/display/minus" class="button">➖</a>
<div class="message">{message}</div>
<a href="/" class="back">⬅ Back</a></body></html>
