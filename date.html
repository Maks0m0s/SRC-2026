<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{event_name}</title>

<style>
body {
    margin: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0b1320;
    color: #eaeaf0;
    padding: 40px 16px 140px;
    text-align: center;
}

/* Title badge */
h1 {
    display: inline-block;
    background: {card_color};
    padding: 10px 18px;
    border-radius: 10px;
    font-size: 2.2em;
    box-shadow: 0 6px 20px rgba(0,0,0,0.5);
    margin-bottom: 30px;
    word-break: break-word;
}

/* Card */
.card {
    max-width: 420px;
    margin: auto;
    background: #111a2e;
    border-radius: 18px;
    padding: 26px 22px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.6);
}

.label {
    font-size: 0.9em;
    opacity: 0.7;
    margin-top: 18px;
}

.value {
    font-size: 1.6em;
    font-weight: 600;
    margin-top: 6px;
}

.days {
    font-size: 2.6em;
    font-weight: 700;
    color: #ffeb3b;
    margin-top: 15px;
}

/* Buttons */
a.button {
    display: block;
    max-width: 420px;
    margin: 18px auto;
    padding: 16px 0;
    font-size: 1.4em;
    border-radius: 16px;
    text-decoration: none;
    color: white;
    background: #1e2a44;
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
}
a.button:hover {
    transform: scale(1.05);
}

a.delete {
    background: #c62828;
}

/* Back */
a.back {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 80%;
    max-width: 420px;
    background: #ffeb3b;
    color: #000;
    font-size: 1.6em;
    padding: 16px 0;
    border-radius: 18px;
    text-decoration: none;
    font-weight: 600;
}
</style>
</head>

<body>

<h1>{event_name}</h1>

<div class="card">
    <div class="label">📅 Event Date</div>
    <div class="value">{event_date}</div>

    <div class="label">📅 Today</div>
    <div class="value">{today}</div>

    <div class="label">⏳ Days Remaining</div>
    <div class="days">{days_left}</div>
</div>

<a href="/edit-day/{id}" class="button">✏️ Edit Day</a>
<a href="/delete-day/{id}" class="button delete">🗑 Delete Day</a>
<a href="/important-days" class="back">
    ⬅ Back
</a>
</body>
</html>
