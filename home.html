<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #0f2027, #203a43); /* dark blue */
    color: white;
    padding-top: 60px;
    padding-bottom: 120px;
}
h1 {
    font-size: 3em;
    margin-bottom: 50px;
}
a.button {
    display: block;
    width: 80%;
    max-width: 400px;
    margin: 20px auto;
    background-color: #001f4d;
    color: #ffffff;
    font-size: 2em;
    padding: 20px 0;
    border-radius: 20px;
    text-decoration: none;
    transition: all 0.3s ease;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}
a.button:hover {
    transform: scale(1.05);
    background-color: #003366;
}
a.back {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 80%;
    max-width: 400px;
    font-size: 1.8em;
    background-color: #ffeb3b; /* yellow */
    color: #000000; /* black text */
    border-radius: 20px;
    padding: 18px 0;
    text-decoration: none;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    z-index: 1000;
}
a.back:hover {
    background-color: #ffd600;
}
</style>
</head>
<body>
<h1>🌍 Welcome</h1>
<a href="/time" class="button">⏰ Time</a>
<a href="/important-days" class="button">📅 Important Days</a>
<a href="/alarms" class="button">🔔 Alarms</a>
<a href="/display" class="button"> 🖥 Display</a>
</body></html>
