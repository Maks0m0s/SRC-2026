<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Setup</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #0f2027, #203a43);
    color: white;
    padding-top: 30px;
    padding-bottom: 120px;
    margin: 0;
}

h2 {
    font-size: 2.2em;
    margin-bottom: 20px;
}

.page {
    padding: 10px;
}

/* Card */
.form-card {
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(12px);
    border-radius: 22px;
    padding: 30px 20px 35px;
    box-shadow: 0 10px 35px rgba(0,0,0,0.45);
    max-width: 420px;
    margin: auto;
}

/* Form */
form {
    text-align: left;
}

/* Inputs */
input {
    width: 100%;
    font-size: 1.1em;
    padding: 14px 16px;
    border-radius: 14px;
    border: none;
    background: rgba(255,255,255,0.12);
    color: #ffffff;
    margin-bottom: 16px;
}

input::placeholder {
    color: rgba(255,255,255,0.65);
}

input:focus {
    outline: none;
    background: rgba(255,255,255,0.22);
}

/* Time row */
.time-row,
.date-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 18px;
}

.time-row input,
.date-row input {
    width: 90px;
    text-align: center;
    font-size: 1.2em;
}

/* Separator */
.time-separator {
    font-size: 1.6em;
    font-weight: 700;
    opacity: 0.8;
}

/* Button */
button {
    width: 100%;
    font-size: 1.4em;
    padding: 14px;
    background-color: #003366;
    color: white;
    border: none;
    border-radius: 16px;
    margin-top: 15px;
    cursor: pointer;
}

button:active {
    opacity: 0.9;
}

/* Message */
.message {
    margin: 10px 0;
    font-size: 1.1em;
    color: #ffeb3b;
    text-align: center;
}
</style>
</head>

<body>
<div class="page">
    <h2>⏰ Time Setup</h2>

    <div class="form-card">
        <form action="/" method="POST">
            <div class="time-row">
                <input type="number" name="hour" min="0" max="23" placeholder="HH" required>
                <span class="time-separator">:</span>
                <input type="number" name="minute" min="0" max="59" placeholder="MM" required>
            </div>

            <div class="date-row">
                <input type="number" name="day" min="1" max="31" placeholder="DD" required>
                <span class="time-separator">-</span>
                <input type="number" name="month" min="1" max="12" placeholder="MM" required>
                <span class="time-separator">-</span>
                <input type="number" name="year" min="2024" placeholder="YYYY" required>
            </div>

            <div class="message">{message}</div>

            <button type="submit">Set Time</button>
        </form>
    </div>
</div>
</body>
</html>
