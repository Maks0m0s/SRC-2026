<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Alarm</title>

<style>
body {
    font-family: 'Roboto', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43);
    color: #ffffff;
    margin: 0;
    padding: 30px 20px 120px;
    display: flex;
    justify-content: center;
}

/* Container */
.page {
    width: 100%;
    max-width: 420px;
    text-align: center;
}

/* Title */
h1 {
    font-size: 2.6em;
    margin: 15px 0 30px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
}

/* Clock icon (top) */
.clock-icon {
    font-size: 3.2em;
    color: #FFD700;
    margin-bottom: 20px;
}

/* Card */
.form-card {
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(12px);
    border-radius: 22px;
    padding: 35px 25px 40px;
    box-shadow: 0 10px 35px rgba(0,0,0,0.45);
}

/* Inputs */
input, select {
    width: 100%;
    font-size: 1.2em;
    padding: 14px 16px;
    border-radius: 14px;
    border: none;
    background: rgba(255,255,255,0.12);
    color: #ffffff;
    margin-bottom: 18px;
    transition: all 0.25s ease;
}

input::placeholder {
    color: rgba(255,255,255,0.65);
}

input:focus, select:focus {
    outline: none;
    background: rgba(255,255,255,0.22);
    box-shadow: 0 0 12px rgba(255,255,255,0.35);
}

/* Time row */
.time-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 22px;
}

.time-row input {
    width: 110px;
    text-align: center;
    font-size: 1.4em;
    font-weight: 500;
}

/* Colon */
.time-separator {
    font-size: 2em;
    font-weight: 700;
    opacity: 0.8;
}

/* Save button */
button {
    width: 100%;
    font-size: 1.6em;
    padding: 16px 0;
    border-radius: 18px;
    border: none;
    cursor: pointer;
    font-weight: 700;
    background: #283593;
    color: #ffffff;
    box-shadow: 0 8px 20px rgba(0,0,0,0.45);
    transition: all 0.3s ease;
}

/* Back button */
a.back {
    position: fixed;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    width: calc(100% - 40px);
    max-width: 420px;
    text-align: center;
    font-size: 1.6em;
    background-color: #ffeb3b;
    color: #000;
    border-radius: 20px;
    padding: 16px 0;
    text-decoration: none;
    font-weight: 500;
    box-shadow: 0 6px 18px rgba(0,0,0,0.35);
    transition: all 0.3s ease;
}

a.back:hover {
    background-color: #ffd600;
}
</style>
</head>

<body>

<div class="page">

    <div class="clock-icon">⏰</div>
    <h1>Add Alarm</h1>

    <div class="form-card">
        <form action="/save-alarm" method="GET">

            <input type="text" style="width: 250px;" name="name" placeholder="Alarm name" required>

            <div class="time-row">
                <input type="number" name="h" min="0" max="23" placeholder="HH" required>
                <span class="time-separator">:</span>
                <input type="number" name="m" min="0" max="59" placeholder="MM" required>
            </div>

            <select name="repeat">
                <option value="once">Once</option>
                <option value="daily">Daily</option>
            </select>

            <button type="submit">Save Alarm</button>
        </form>
    </div>
</div>
<a href="/alarms" class="back">⬅ Back</a>
</body>
</html>
