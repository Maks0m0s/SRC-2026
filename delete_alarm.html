<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delete Alarm</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #0f2027, #203a43);
    color: white;
    padding-top: 60px;
    padding-bottom: 120px;
}

h1 {
    font-size: 3em;
    margin-bottom: 30px;
}

button {
    width: 80%;
    max-width: 400px;
    font-size: 2em;
    padding: 20px;
    border-radius: 20px;
    border: none;
    background-color: #b71c1c;
    color: white;
    margin-top: 30px;
}

a.back {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 80%;
    max-width: 400px;
    font-size: 1.8em;
    background-color: #ffeb3b;
    color: #000000;
    border-radius: 20px;
    padding: 18px 0;
    text-decoration: none;
}
</style>
</head>

<body>

<h1>🗑 Delete Alarm</h1>

<p>Delete alarm: <strong>{name}</strong>?</p>

<form action="/delete-alarm">
    <input type="hidden" name="id" value="{id}">
    <button type="submit">Delete</button>
</form>

<a href="/alarms" class="back">⬅ Back</a>

</body>
</html>
